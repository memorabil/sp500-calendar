<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="theme-color" content="#f5f5f7" />
<title>S&P 500 Calendar — Earnings, Dividends & More</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 17l6-6 4 4 7-7"/>
            <path d="M14 8h6v6"/>
          </svg>
        </div>
        <div class="brand-text">
          <h1>Market Calendar</h1>
          <p>S&P 500 events, sorted chronologically</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="refreshBtn" title="Refresh data">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 11-3-6.7L21 8"/>
            <path d="M21 3v5h-5"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Search bar -->
    <div class="search-bar">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.3-4.3"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Search ticker or company (AAPL, Tesla...)" />
      <button class="clear-btn" id="clearSearch" aria-label="Clear">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Filter chips -->
    <div class="filter-row" id="filterRow">
      <button class="chip active" data-filter="all">
        <span class="chip-dot all"></span> All
      </button>
      <button class="chip" data-filter="earnings">
        <span class="chip-dot earnings"></span> Earnings
      </button>
      <button class="chip" data-filter="ex-dividend">
        <span class="chip-dot ex-dividend"></span> Ex-dividend
      </button>
      <button class="chip" data-filter="dividend-payment">
        <span class="chip-dot dividend-payment"></span> Dividend pay
      </button>
      <button class="chip" data-filter="split">
        <span class="chip-dot split"></span> Stock split
      </button>
      <button class="chip" data-filter="ipo">
        <span class="chip-dot ipo"></span> IPO
      </button>
    </div>
  </header>

  <!-- Status bar -->
  <div class="status-bar" id="statusBar">
    <span id="statusText">Loading events…</span>
  </div>

  <!-- Timeline -->
  <main class="timeline" id="timeline">
    <!-- Events injected here -->
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>Data: Yahoo Finance · Built for S&P 500 tracking</p>
  </footer>
</div>

<!-- Detail sheet (iOS-style modal) -->
<div class="sheet-backdrop" id="sheetBackdrop"></div>
<div class="sheet" id="detailSheet" role="dialog" aria-modal="true">
  <div class="sheet-handle"></div>
  <div class="sheet-content" id="sheetContent">
    <!-- populated by JS -->
  </div>
</div>

<script src="data/sp500.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
</body>
</html>
